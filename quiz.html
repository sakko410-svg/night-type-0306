<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>診断｜NightType</title>
  <link rel="stylesheet" href="./style.css"/>
  <style>
    /* ── Tinder風フルスクリーンレイアウト ── */
    body { overflow: hidden; }
    .quiz-page {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      background: var(--bg);
      padding: 0;
    }

    /* ── トップバー ── */
    .quiz-topbar {
      padding: 56px 20px 12px;
      display: flex; flex-direction: column; gap: 8px;
      flex-shrink: 0; z-index: 10;
    }
    .progress-top { display: flex; justify-content: space-between; align-items: center; }
    .progress-top span { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; }
    .progress-num { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--purple-ll); }
    .progress-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--pink)); border-radius: 999px; transition: width 0.4s cubic-bezier(0.4,0,0.2,1); }

    /* ── カードスタック ── */
    .card-stack {
      flex: 1; position: relative;
      display: flex; align-items: center; justify-content: center;
      padding: 8px 16px; overflow: hidden;
    }

    /* 背景にある次のカード */
    .q-card-next {
      position: absolute;
      width: calc(100% - 48px); max-width: 420px;
      border-radius: 24px; background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px 24px 24px;
      transform: scale(0.93) translateY(12px);
      opacity: 0.5;
      pointer-events: none;
      transition: transform 0.3s, opacity 0.3s;
    }
    .q-card-next.peek { transform: scale(0.95) translateY(8px); opacity: 0.65; }

    /* メインカード */
    .q-card-main {
      position: relative; z-index: 5;
      width: calc(100% - 32px); max-width: 440px;
      border-radius: 24px; background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px 24px 28px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      cursor: grab; user-select: none; touch-action: pan-y;
      transition: box-shadow 0.2s;
      will-change: transform;
    }
    .q-card-main:active { cursor: grabbing; }

    .q-tag {
      font-size: 0.58rem; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--purple-ll); margin-bottom: 20px; font-family: 'Syne', sans-serif;
      display: flex; align-items: center; gap: 8px;
    }
    .q-tag::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--purple-l); }

    .q-text {
      font-size: 1.12rem; line-height: 1.75; font-weight: 500;
      color: var(--white); min-height: 80px;
      margin-bottom: 24px;
    }

    /* スワイプラベル */
    .swipe-label {
      position: absolute; top: 28px;
      padding: 8px 18px; border-radius: 12px;
      font-family: 'Syne', sans-serif; font-weight: 800;
      font-size: 1rem; letter-spacing: 0.12em;
      opacity: 0; transition: opacity 0.08s;
      pointer-events: none; z-index: 10;
    }
    .swipe-label.yes {
      right: 20px; transform: rotate(12deg);
      background: rgba(124,58,237,0.2);
      border: 3px solid var(--purple-l);
      color: var(--purple-ll);
    }
    .swipe-label.no {
      left: 20px; transform: rotate(-12deg);
      background: rgba(236,72,153,0.15);
      border: 3px solid var(--pink);
      color: var(--pink-l);
    }

    /* ── ボタンエリア ── */
    .action-row {
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 20px; padding: 12px 24px 20px;
    }
    .btn-action {
      width: 64px; height: 64px; border-radius: 50%;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; transition: all 0.2s;
      position: relative; overflow: visible;
    }
    .btn-action:active { transform: scale(0.9) !important; }
    .btn-no-action {
      background: rgba(236,72,153,0.12);
      border: 2px solid rgba(236,72,153,0.4);
      box-shadow: 0 4px 20px rgba(236,72,153,0.2);
    }
    .btn-no-action:hover { transform: scale(1.08); background: rgba(236,72,153,0.2); }
    .btn-yes-action {
      width: 76px; height: 76px; font-size: 1.9rem;
      background: rgba(124,58,237,0.18);
      border: 2px solid rgba(168,85,247,0.5);
      box-shadow: 0 4px 24px rgba(124,58,237,0.3);
    }
    .btn-yes-action:hover { transform: scale(1.08); background: rgba(124,58,237,0.28); }
    .btn-back-action {
      width: 48px; height: 48px; font-size: 1.1rem;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(255,255,255,0.1);
    }
    .btn-back-action:hover { transform: scale(1.08); background: rgba(255,255,255,0.08); }
    .btn-back-action:disabled { opacity: 0.2; pointer-events: none; }

    .action-label {
      font-size: 0.55rem; color: var(--muted); letter-spacing: 0.1em;
      text-align: center; margin-top: 6px; font-family: 'Syne', sans-serif;
    }
    .action-col { display: flex; flex-direction: column; align-items: center; }

    /* ── パーティクル ── */
    .particle-canvas {
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
    }

    /* ── 分析ローディング ── */
    .analyzing-overlay { position: fixed; inset: 0; z-index: 300; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 24px; opacity: 0; pointer-events: none; transition: opacity 0.5s; }
    .analyzing-overlay.show { opacity: 1; pointer-events: all; }
    .analyzing-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; background: linear-gradient(135deg, var(--purple-ll), var(--pink-l)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
    .analyzing-sub { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.15em; text-align: center; }
    .analyzing-bar-wrap { width: 240px; height: 3px; background: rgba(255,255,255,0.06); border-radius: 999px; overflow: hidden; }
    .analyzing-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--purple), var(--pink)); border-radius: 999px; transition: width 0.15s; }
    .analyzing-chars { display: flex; gap: 10px; margin-bottom: 8px; }
    .analyzing-chars img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; border: 2px solid var(--border); opacity: 0; transform: scale(0.5); transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1); }
    .analyzing-chars img.show { opacity: 1; transform: scale(1); }

    /* 確認ダイアログ */
    .confirm-overlay { position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.75); backdrop-filter: blur(12px); display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .confirm-overlay.show { opacity: 1; pointer-events: all; }
    .confirm-sheet { width: 100%; max-width: 480px; background: var(--surface); border-radius: 24px 24px 0 0; border: 1px solid var(--border); border-bottom: none; padding: 32px 24px 48px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    .confirm-overlay.show .confirm-sheet { transform: translateY(0); }
    .confirm-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; margin-bottom: 10px; text-align: center; }
    .confirm-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.7; text-align: center; margin-bottom: 24px; }
    .confirm-btns { display: flex; flex-direction: column; gap: 10px; }
    .confirm-yes { width: 100%; padding: 16px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--purple), var(--pink)); color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .confirm-no { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; cursor: pointer; }
  </style>
</head>
<body>

<!-- パーティクルCanvas -->
<canvas class="particle-canvas" id="particleCanvas"></canvas>

<!-- 分析ローディング -->
<div class="analyzing-overlay" id="analyzingOverlay">
  <div class="analyzing-chars" id="analyzingChars"></div>
  <div class="analyzing-title">タイプを分析中…</div>
  <div class="analyzing-sub">あなたの夜の価値観を解析しています</div>
  <div class="analyzing-bar-wrap"><div class="analyzing-bar" id="analyzingBar"></div></div>
</div>

<!-- やり直し確認 -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-sheet">
    <div class="confirm-title">診断をやり直しますか？</div>
    <div class="confirm-desc">現在の回答がすべてリセットされます。</div>
    <div class="confirm-btns">
      <button class="confirm-yes" id="confirmYes">最初からやり直す</button>
      <button class="confirm-no"  id="confirmNo">続ける</button>
    </div>
  </div>
</div>

<canvas id="bg-canvas"></canvas>
<div class="noise"></div>

<!-- クイズUI -->
<div class="quiz-page">

  <!-- トップバー -->
  <div class="quiz-topbar">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <a href="index.html" class="nav-logo" style="font-size:1rem">NightType</a>
      <button class="hamburger" id="hamburger" style="position:static"><span></span><span></span><span></span></button>
    </div>
    <div class="progress-top">
      <span>Progress</span>
      <span class="progress-num" id="progressText">1 / 24</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:4%"></div>
    </div>
  </div>

  <!-- カードスタック -->
  <div class="card-stack" id="cardStack">
    <!-- 背景カード（次の質問のチラ見せ） -->
    <div class="q-card-next" id="qCardNext">
      <div style="height:8px;background:rgba(255,255,255,0.04);border-radius:4px;margin-bottom:12px"></div>
      <div style="height:8px;background:rgba(255,255,255,0.04);border-radius:4px;width:70%"></div>
    </div>
    <!-- メインカード -->
    <div class="q-card-main" id="qCard">
      <div class="swipe-label yes" id="labelYes">当てはまる 💜</div>
      <div class="swipe-label no"  id="labelNo">違う 💔</div>
      <div class="q-tag" id="qNum">Question 01</div>
      <p class="q-text" id="question">読み込み中...</p>
    </div>
  </div>

  <!-- アクションボタン行 -->
  <div class="action-row">
    <div class="action-col">
      <button class="btn-action btn-back-action" id="backBtn" disabled title="戻る">↩</button>
      <div class="action-label">戻る</div>
    </div>
    <div class="action-col">
      <button class="btn-action btn-no-action" id="noBtn" title="当てはまらない">💔</button>
      <div class="action-label">違う</div>
    </div>
    <div class="action-col">
      <button class="btn-action btn-yes-action" id="yesBtn" title="当てはまる">💜</button>
      <div class="action-label">当てはまる</div>
    </div>
  </div>

</div>

<!-- ドロワー -->
<div class="drawer" id="drawer">
  <a href="index.html"><span class="icon">🏠</span>ホーム</a>
  <a href="quiz.html" class="active"><span class="icon">🌙</span>診断する</a>
  <a href="characters.html"><span class="icon">🎴</span>キャラ一覧</a>
  <a href="compat.html"><span class="icon">💜</span>相性チェック</a>
  <a href="matrix.html"><span class="icon">📊</span>相性マトリクス</a>
</div>
<div class="drawer-overlay" id="drawer-overlay"></div>

<script src="./questions.js"></script>
<script src="./types.js"></script>
<script>
// ── 状態 ──
let idx = 0;
const scores = {};
const history = [];

const card     = document.getElementById('qCard');
const cardNext = document.getElementById('qCardNext');
const qEl      = document.getElementById('question');
const qNum     = document.getElementById('qNum');
const fill     = document.getElementById('progressFill');
const txt      = document.getElementById('progressText');
const overlay  = document.getElementById('analyzingOverlay');
const bar      = document.getElementById('analyzingBar');
const backBtn  = document.getElementById('backBtn');
const labelYes = document.getElementById('labelYes');
const labelNo  = document.getElementById('labelNo');
const pCanvas  = document.getElementById('particleCanvas');
const pCtx     = pCanvas.getContext('2d');

// パーティクルCanvas サイズ
function resizePC(){ pCanvas.width=window.innerWidth; pCanvas.height=window.innerHeight; }
resizePC(); window.addEventListener('resize', resizePC);

// 分析画面キャラ
const aChars = document.getElementById('analyzingChars');
Object.keys(types).slice(0,5).forEach(k => {
  const t = types[k]; if(!t.image) return;
  const img = document.createElement('img'); img.src = t.image;
  aChars.appendChild(img);
});

// URLパラメータ
if(new URLSearchParams(location.search).get('restart')==='1'){
  localStorage.removeItem('nightTypeScores');
}

function pad(n){ return n<10?'0'+n:''+n; }

function show(){
  qEl.textContent = questions[idx].text;
  qNum.textContent = 'Question ' + pad(idx+1);
  fill.style.width = Math.max((idx/questions.length)*100, 4) + '%';
  txt.textContent  = (idx+1) + ' / ' + questions.length;
  backBtn.disabled = idx === 0;
  // 次のカードを少しのぞかせる
  if(idx+1 < questions.length){
    cardNext.classList.add('peek');
  } else {
    cardNext.classList.remove('peek');
  }
}

// ── 効果音（Web Audio API） ──
let audioCtx = null;
function getAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSwipeSound(isYes){
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    if(isYes){
      osc.frequency.setValueAtTime(440, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(660, ctx.currentTime+0.12);
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.22);
    } else {
      osc.frequency.setValueAtTime(320, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime+0.12);
      gain.gain.setValueAtTime(0.14, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.2);
    }
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);
  } catch(e){}
}

// ── パーティクルエフェクト ──
let particles = [];
function spawnParticles(isYes, x, y){
  const colors = isYes
    ? ['#a855f7','#c4b5fd','#ec4899','#f9a8d4','#8b5cf6']
    : ['#ec4899','#f9a8d4','#fb7185','#fda4af'];
  const count = isYes ? 28 : 18;
  for(let i=0; i<count; i++){
    const angle = (Math.PI*2/count)*i + Math.random()*0.5;
    const speed = 4 + Math.random()*6;
    particles.push({
      x, y,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - (isYes?3:1),
      color: colors[Math.floor(Math.random()*colors.length)],
      size: isYes ? 6+Math.random()*6 : 5+Math.random()*5,
      life: 1,
      decay: 0.025+Math.random()*0.02,
      emoji: isYes && Math.random()<0.4 ? '💜' : null,
      gravity: 0.22
    });
  }
}

function animateParticles(){
  pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
    p.vx *= 0.97; p.life -= p.decay;
    pCtx.globalAlpha = Math.max(0, p.life);
    if(p.emoji){
      pCtx.font = `${p.size*2}px sans-serif`;
      pCtx.fillText(p.emoji, p.x, p.y);
    } else {
      pCtx.fillStyle = p.color;
      pCtx.beginPath();
      pCtx.arc(p.x, p.y, p.size*p.life, 0, Math.PI*2);
      pCtx.fill();
    }
    pCtx.globalAlpha = 1;
  });
  if(particles.length > 0) requestAnimationFrame(animateParticles);
  else pCtx.clearRect(0,0,pCanvas.width,pCanvas.height);
}

// ── カードアニメーション ──
function flyCard(direction, cb){
  const tx = direction === 'yes' ?  window.innerWidth * 1.3 : -window.innerWidth * 1.3;
  const rot = direction === 'yes' ? 30 : -30;
  card.style.transition = 'transform 0.38s cubic-bezier(0.4,0,0.8,0.6), opacity 0.38s';
  card.style.transform = `translateX(${tx}px) rotate(${rot}deg)`;
  card.style.opacity = '0';
  setTimeout(() => {
    card.style.transition = '';
    card.style.transform = '';
    card.style.opacity = '';
    cb();
    // 次カードをアニメーションで前に出す
    cardNext.style.transition = 'transform 0.3s, opacity 0.3s';
    cardNext.style.transform = 'scale(1) translateY(0)';
    setTimeout(() => {
      cardNext.style.transition = '';
      cardNext.style.transform = '';
    }, 320);
  }, 360);
}

function answer(val){
  history.push({ type: questions[idx].type, val });
  scores[questions[idx].type] = (scores[questions[idx].type]||0) + val;

  const isYes = val === 1;
  playSwipeSound(isYes);

  // パーティクル（カード中心から）
  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  spawnParticles(isYes, cx, cy);
  requestAnimationFrame(animateParticles);

  idx++;
  if(idx < questions.length){
    flyCard(isYes?'yes':'no', show);
    fill.style.width = ((idx/questions.length)*100) + '%';
    txt.textContent = (idx+1) + ' / ' + questions.length;
  } else {
    fill.style.width = '100%';
    localStorage.setItem('nightTypeScores', JSON.stringify(scores));
    overlay.classList.add('show');
    const imgs = aChars.querySelectorAll('img');
    imgs.forEach((im,i) => setTimeout(()=>im.classList.add('show'), i*180));
    let p=0;
    const iv = setInterval(()=>{
      p = Math.min(p+2,100); bar.style.width = p+'%';
      if(p>=100){ clearInterval(iv); setTimeout(()=>window.location.href='result.html',400); }
    },30);
  }
}

// 戻る
backBtn.addEventListener('click', () => {
  if(idx===0||history.length===0) return;
  const last = history.pop();
  idx--;
  scores[last.type] = (scores[last.type]||0) - last.val;
  card.style.transition = 'transform 0.3s, opacity 0.3s';
  card.style.transform = 'scale(0.95)';
  card.style.opacity = '0.5';
  setTimeout(() => {
    card.style.transition = '';
    card.style.transform = '';
    card.style.opacity = '';
    show();
  }, 200);
});

document.getElementById('yesBtn').addEventListener('click', () => answer(1));
document.getElementById('noBtn').addEventListener('click',  () => answer(0));

// ── スワイプ操作 ──
let startX=0, startY=0, isDragging=false, currentX=0, didSwipe=false;
const THRESHOLD = 90;

function onDragStart(x, y){
  startX=x; startY=y; isDragging=true; currentX=0; didSwipe=false;
}
function onDragMove(x, y){
  if(!isDragging) return;
  const dx = x-startX, dy = y-startY;
  if(!didSwipe && Math.abs(dy) > Math.abs(dx)*1.6){ isDragging=false; return; }
  currentX = dx;
  const ratio = Math.min(Math.abs(dx)/THRESHOLD, 1);
  card.style.transform = `translateX(${dx*0.55}px) rotate(${dx*0.04}deg)`;
  if(dx > 15){
    labelYes.style.opacity = ratio * 1.1;
    labelNo.style.opacity = 0;
    card.style.boxShadow = `${4*ratio}px 0 ${28*ratio}px rgba(124,58,237,${0.35*ratio})`;
  } else if(dx < -15){
    labelNo.style.opacity = ratio * 1.1;
    labelYes.style.opacity = 0;
    card.style.boxShadow = `${-4*ratio}px 0 ${28*ratio}px rgba(236,72,153,${0.3*ratio})`;
  } else {
    labelYes.style.opacity = 0; labelNo.style.opacity = 0;
    card.style.boxShadow = '';
  }
}
function onDragEnd(){
  if(!isDragging) return;
  isDragging = false;
  card.style.boxShadow = '';
  labelYes.style.opacity = 0; labelNo.style.opacity = 0;
  if(currentX > THRESHOLD){
    answer(1);
  } else if(currentX < -THRESHOLD){
    answer(0);
  } else {
    card.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    card.style.transform = '';
    setTimeout(()=>{ card.style.transition=''; },400);
  }
}

card.addEventListener('touchstart', e => onDragStart(e.touches[0].clientX, e.touches[0].clientY), {passive:true});
card.addEventListener('touchmove',  e => onDragMove(e.touches[0].clientX, e.touches[0].clientY),  {passive:true});
card.addEventListener('touchend',   onDragEnd);
card.addEventListener('mousedown',  e => { onDragStart(e.clientX,e.clientY); card.style.cursor='grabbing'; });
window.addEventListener('mousemove',e => onDragMove(e.clientX,e.clientY));
window.addEventListener('mouseup',  ()=>{ card.style.cursor=''; onDragEnd(); });

// ── 確認ダイアログ ──
const confirmOverlay = document.getElementById('confirmOverlay');
document.querySelector('.nav-logo').addEventListener('click', e => {
  if(idx > 0){ e.preventDefault(); confirmOverlay.classList.add('show'); }
});
document.getElementById('confirmYes').addEventListener('click', () => window.location.href='quiz.html?restart=1');
document.getElementById('confirmNo').addEventListener('click',  () => confirmOverlay.classList.remove('show'));

show();
</script>
<script src="./common.js"></script>
</body>
</html>
